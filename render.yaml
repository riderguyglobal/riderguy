# ============================================================
# Render Blueprint — RiderGuy API
# https://render.com/docs/blueprint-spec
#
# Deploy: Connect this repo on Render → it auto-detects this file.
# Or manually: Dashboard → New → Blueprint → select this repo.
#
# Keys marked `sync: false` must be set manually in the Render
# dashboard after deployment.
# ============================================================

services:
  # ── Express API Server ──────────────────────────────────────
  - type: web
    name: riderguy-api
    runtime: node
    region: frankfurt  # Closest to West Africa (Ghana)
    plan: starter      # $7/mo — always-on (free tier spins down)
    buildCommand: |
      npm install --legacy-peer-deps &&
      cd packages/database && npm run generate && npx prisma migrate deploy && cd ../.. &&
      rm -rf apps/api/dist &&
      npx turbo run build --filter=@riderguy/api
    startCommand: cd apps/api && node dist/index.js
    healthCheckPath: /health
    envVars:
      # ── Core ──
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"

      # ── Database (Neon PostgreSQL) ──
      - key: DATABASE_URL
        sync: false  # Neon pooled connection string
      - key: DIRECT_URL
        sync: false  # Neon direct (non-pooled) connection string

      # ── Redis (auto-injected from riderguy-redis service) ──
      - key: REDIS_URL
        fromService:
          name: riderguy-redis
          type: redis
          property: connectionString

      # ── JWT Auth ──
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"

      # ── S3 / Cloudflare R2 (file uploads) ──
      - key: S3_ENDPOINT
        sync: false  # e.g. https://<account-id>.r2.cloudflarestorage.com
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        value: riderguy-uploads
      - key: S3_REGION
        value: auto

      # ── Paystack (payments) ──
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false  # Same as secret key for Paystack

      # ── mNotify SMS (Ghana) ──
      - key: MNOTIFY_API_KEY
        sync: false
      - key: MNOTIFY_SENDER_ID
        value: Riderguy

      # ── Email (SendGrid) ──
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: noreply@myriderguy.com

      # ── Firebase Cloud Messaging (push notifications) ──
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false

      # ── Mapbox (directions & geocoding) ──
      - key: MAPBOX_ACCESS_TOKEN
        sync: false

      # ── WebAuthn (Biometric / Passkey Login) ──
      - key: WEBAUTHN_RP_NAME
        value: RiderGuy
      - key: WEBAUTHN_RP_ID
        value: myriderguy.com
      - key: WEBAUTHN_ORIGIN
        value: "https://myriderguy.com,https://www.myriderguy.com,https://app.myriderguy.com,https://rider.myriderguy.com,https://admin.myriderguy.com"

      # ── CORS & URLs ──
      - key: APP_URL
        value: https://app.myriderguy.com
      - key: CORS_ORIGINS
        value: "https://myriderguy.com,https://www.myriderguy.com,https://app.myriderguy.com,https://rider.myriderguy.com,https://admin.myriderguy.com,https://riderguy-client.vercel.app,https://riderguy-rider.vercel.app,https://riderguy-admin.vercel.app,https://riderguy-marketing.vercel.app,http://localhost:3000,http://localhost:3001,http://localhost:3002"

  # ── Redis (for rate limiting & BullMQ job queue) ────────────
  - type: redis
    name: riderguy-redis
    region: frankfurt  # Must match API region for internal networking
    plan: starter  # $7/mo — 25MB, persistent
    maxmemoryPolicy: noeviction
    ipAllowList: []  # Only internal services can connect
