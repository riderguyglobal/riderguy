# ══════════════════════════════════════════
# API: api.myriderguy.com
# ══════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name api.myriderguy.com;

    # Security headers (API responses)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Auth endpoints (strict rate limit: 5 req/s)
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint
    location /ws {
        limit_req zone=ws_conn burst=5 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Socket.IO endpoint
    location /socket.io/ {
        limit_req zone=ws_conn burst=10 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Uploaded files (served directly by Nginx - no proxy)
    location /uploads/ {
        alias /var/www/riderguy/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff always;
        # Block script execution in uploads
        location ~* \.(php|jsp|py|sh|cgi|pl)$ {
            deny all;
            return 404;
        }
    }

    # General API routes
    location / {
        limit_req zone=api_general burst=50 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Security: block dot files
    location ~ /\.(git|env|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    client_max_body_size 25M;
}

# ══════════════════════════════════════════
# Default / IP fallback server
# ══════════════════════════════════════════
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Health check for monitoring
    location /health {
        proxy_pass http://api_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Serve marketing site by default
    location / {
        proxy_pass http://marketing;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
