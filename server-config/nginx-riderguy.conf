# RiderGuy Production Nginx Configuration
# ==========================================
# Hetzner CX43 (8 vCPU, 16GB RAM, 160GB SSD)
# All 5 apps behind Nginx reverse proxy with SSL
# Certbot manages HTTPS blocks via Let's Encrypt

# ── Performance tuning ──
proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=static_cache:10m max_size=1g inactive=24h use_temp_path=off;

# ── Gzip compression ──
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/vnd.ms-fontobject
    font/opentype
    font/woff2
    image/svg+xml
    image/x-icon;

# ── Rate limiting zones ──
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=ws_conn:10m rate=10r/s;
limit_req_status 429;

# ── Connection limits ──
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ── Security hardening ──
server_tokens off;

# ── Shared security headers (included in every server block) ──
# Defined as a map so they can be added via include or inline
# We'll add them directly in each server block below.

# ── Upstream definitions ──
upstream marketing   { server 127.0.0.1:3000; keepalive 8; }
upstream rider_app   { server 127.0.0.1:3001; keepalive 8; }
upstream client_app  { server 127.0.0.1:3002; keepalive 8; }
upstream admin_app   { server 127.0.0.1:3003; keepalive 8; }
upstream api_backend { server 127.0.0.1:4000; keepalive 16; }

# ══════════════════════════════════════════
# Marketing site: myriderguy.com
# ══════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name myriderguy.com www.myriderguy.com;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /_next/static/ {
        proxy_pass http://marketing;
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;
    }

    location / {
        proxy_pass http://marketing;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

