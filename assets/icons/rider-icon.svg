<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundClip)">
    <!-- Dark background -->
    <rect width="512" height="512" fill="url(#bgGrad)"/>

    <!-- Subtle radial glow behind the icon -->
    <circle cx="256" cy="240" r="200" fill="#22c55e" opacity="0.06"/>

    <!-- Motorcycle wheel (bottom-left hint) -->
    <circle cx="170" cy="390" r="52" fill="none" stroke="#22c55e" stroke-width="5" opacity="0.25"/>
    <circle cx="170" cy="390" r="38" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.15"/>

    <!-- Motorcycle wheel (bottom-right hint) -->
    <circle cx="342" cy="390" r="52" fill="none" stroke="#22c55e" stroke-width="5" opacity="0.25"/>
    <circle cx="342" cy="390" r="38" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.15"/>

    <!-- Speed lines (motion) -->
    <line x1="60" y1="230" x2="130" y2="230" stroke="#22c55e" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
    <line x1="40" y1="260" x2="120" y2="260" stroke="#22c55e" stroke-width="2.5" opacity="0.15" stroke-linecap="round"/>
    <line x1="55" y1="290" x2="115" y2="290" stroke="#22c55e" stroke-width="2" opacity="0.12" stroke-linecap="round"/>

    <!-- Bold "R" lettermark -->
    <text x="256" y="290" text-anchor="middle" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="240" fill="white" letter-spacing="-8">R</text>

    <!-- Green accent bar (top) -->
    <rect x="156" y="90" width="200" height="6" rx="3" fill="url(#greenGrad)"/>

    <!-- Small helmet silhouette (top-right badge) -->
    <g transform="translate(380, 80)" opacity="0.9">
      <path d="M0,32 C0,14 14,0 32,0 C50,0 64,14 64,32 L64,40 C64,44 60,48 56,48 L8,48 C4,48 0,44 0,40 Z" fill="#22c55e"/>
      <rect x="0" y="36" width="64" height="4" rx="2" fill="#16a34a"/>
      <!-- Visor -->
      <rect x="8" y="16" width="48" height="12" rx="4" fill="#0a0a0a" opacity="0.5"/>
    </g>

    <!-- "RIDER" label at bottom -->
    <text x="256" y="450" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="28" fill="#22c55e" letter-spacing="8" opacity="0.7">RIDER</text>
  </g>
</svg>
